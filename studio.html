async function readFileAsText(file){return new Promise((res,rej)=>{const ext=file.name.split('.').pop().toLowerCase();if(ext==='docx'){const r=new FileReader();r.onload=async e=>{try{const x=await mammoth.extractRawText({arrayBuffer:e.target.result});res(x.value);}catch(err){rej(err);}};r.readAsArrayBuffer(file);}else if(ext==='xlsx'||ext==='xls'){const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'binary'});let t='';wb.SheetNames.forEach(n=>{const ws=wb.Sheets[n];t+=XLSX.utils.sheet_to_json(ws,{header:1}).map(r=>r.join('\t')).join('\n')+'\n';});res(t);}catch(err){rej(err);}};r.readAsBinaryString(file);}else{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file);}});}

async function extractWithClaude(text,focus){
  const prompt='You are a change management expert. Analyse this document and extract structured data.\n\nReturn ONLY valid JSON:\n{\n"summary":"2-3 sentence summary",\n"cia_entries":[{"processArea":"","subProcess":"","description":"","changeType":"Process change","affectedRoles":"","impactLevel":"Medium","benefits":"","fuel":"","friction":"","status":"Draft"}],\n"stakeholders":[{"name":"","jobTitle":"","persona":"End Users","site":"","population":1,"readiness":3,"sentiment":"Unknown","influence":"Medium","impactLevel":"Medium","isAdvocate":false,"notes":""}],\n"activities":[{"title":"","description":"","audience":"End Users","channel":"","owner":"","reviewer":"","status":"Not started","publishDate":"","impactLevel":"Medium","ciaLink":""}]\n}\n\nOnly include entries with enough info. Return [] if nothing found.\n\nDocument:\n'+text.slice(0,12000);
  const resp=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
  if(!resp.ok){const e=await resp.text();throw new Error('Function error '+resp.status+': '+e);}
  const data=await resp.json();
  if(data.error)throw new Error(data.error);
  const raw=data.content.map(c=>c.text||'').join('');
  const clean=raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function getCol(row,names){const keys=Object.keys(row);for(const name of names){const n=name.toLowerCase().replace(/[\s_\-\/()]/g,'');const m=keys.find(k=>k.toLowerCase().replace(/[\s_\-\/()]/g,'')===n);if(m!==undefined&&String(row[m]).trim())return String(row[m]).trim();}return'';}
function importXL(file,onRows){const r=new FileReader();r.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];onRows(XLSX.utils.sheet_to_json(ws,{defval:''}));}catch(e){alert('Could not read file.');}};r.readAsBinaryString(file);}
function exportXL(data,filename){const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Data');XLSX.writeFile(wb,filename);}

function AIPanel({onExtract,setToast,inline}){
  const[open,setOpen]=useState(!inline);
  const[text,setText]=useState('');
  const[loading,setLoading]=useState(false);
  const[dragOver,setDragOver]=useState(false);
  const run=async t=>{
    if(!t.trim())return alert('Paste text or upload a file first.');
    setLoading(true);
    try{
      const r=await extractWithClaude(t,'all');
      onExtract(r);
      if(inline){setOpen(false);setText('');}
      const c=[];
      if(r.cia_entries?.length)c.push(r.cia_entries.length+' CIA');
      if(r.stakeholders?.length)c.push(r.stakeholders.length+' stakeholders');
      if(r.activities?.length)c.push(r.activities.length+' activities');
      setToast('✦ Extracted: '+(c.join(', ')||'no data found'));
      setTimeout(()=>setToast(''),4000);
    }catch(e){
      setToast('⚠ '+e.message);
      setTimeout(()=>setToast(''),6000);
    }
    setLoading(false);
  };
  const handleFile=async f=>{setLoading(true);try{const t=await readFileAsText(f);setText(t);}catch(e){alert('Could not read file.');}setLoading(false);};
  const handleDrop=e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)handleFile(f);};
  if(inline&&!open)return React.createElement(Btn,{sm:true,ai:true,onClick:()=>setOpen(true)},'✦ AI Extract from document');
  return React.createElement('div',{style:{background:N3,border:'1px solid rgba(180,127,255,0.3)',borderRadius:6,padding:20,marginTop:inline?16:0}},
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
      React.createElement('div',{style:{fontFamily:'Fraunces,serif',fontSize:16,fontWeight:500,color:CR}},'✦ AI Document Extraction'),
      inline&&React.createElement('button',{onClick:()=>{setOpen(false);setText('');},style:{background:'transparent',border:'none',color:CR2,cursor:'pointer',fontSize:18}},'✕')
    ),
    React.createElement('div',{
      onDrop:handleDrop,
      onDragOver:e=>{e.preventDefault();setDragOver(true);},
      onDragLeave:()=>setDragOver(false),
      onClick:()=>pickFile('.txt,.docx,.xlsx,.xls,.csv',handleFile),
      style:{border:'2px dashed '+(dragOver?PU:BD2),borderRadius:6,padding:16,marginBottom:12,textAlign:'center',cursor:'pointer',background:dragOver?'rgba(180,127,255,0.05)':N}
    },
      React.createElement('div',{style:{fontSize:24,marginBottom:6}},'📄'),
      React.createElement('div',{style:{fontSize:12,color:CR2}},'Drop file or click to browse'),
      React.createElement('div',{style:{fontSize:11,color:CR3,marginTop:4,fontFamily:'JetBrains Mono,monospace'}},'.txt .docx .xlsx .csv')
    ),
    React.createElement('textarea',{value:text,onChange:e=>setText(e.target.value),placeholder:'Or paste transcript, process map, meeting notes or any text here…',rows:5,style:{...inp,resize:'vertical',marginBottom:8}}),
    text&&React.createElement('div',{style:{fontSize:11,color:CR3,fontFamily:'JetBrains Mono,monospace',marginBottom:8}},text.length.toLocaleString()+' characters loaded'),
    React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
      inline&&React.createElement(Btn,{onClick:()=>{setOpen(false);setText('');}}, 'Cancel'),
      React.createElement('button',{onClick:()=>run(text),disabled:loading||!text,style:{background:PU,color:N,border:'none',padding:'8px 20px',borderRadius:3,fontSize:12,fontWeight:600,cursor:loading||!text?'not-allowed':'pointer',fontFamily:'Inter,sans-serif',opacity:loading||!text?0.6:1}},loading?'Extracting…':'✦ Extract with AI')

    if(sel.sh&&result.stakeholders?.length){setStakeholders(p=>{const n=[...p,...result.stakeholders.map((r,i)=>({...r,id:nid([...p,...result.stakeholders.slice(0,i)],'SH')}))];persist(KEYS.sh,n);return n;});added.push(result.stakeholders.length+' stakeholders');}
    if(sel.act&&result.activities?.length){setActivities(p=>{const n=[...p,...result.activities.map((r,i)=>({...r,id:nid([...p,...result.activities.slice(0,i)],'A')}))];persist(KEYS.act,n);return n;});added.push(result.activities.length+' activities');}
    setToast('✦ Added '+added.join(', '));setTimeout(()=>setToast(''),4000);setResult(null);
  };
  const onExtract=r=>setResult(r);
  return React.createElement('div',null,
    React.createElement('div',{style:{marginBottom:24}},

            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
              React.createElement('div',{style:{width:16,height:16,borderRadius:3,border:'2px solid '+(sel[key]&&hasData?PU:BD2),background:sel[key]&&hasData?PU:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:N,flexShrink:0}},sel[key]&&hasData?'✓':''),

function Dashboard({cias,stakeholders,activities}){
  const ta=activities.length||1,ts=stakeholders.length||1;
  const complete=activities.filter(a=>a.status==='Complete').length;
  const totalPop=stakeholders.reduce((a,s)=>a+(parseInt(s.population)||0),0);
  const avgR=(stakeholders.reduce((a,s)=>a+(parseInt(s.readiness)||0),0)/ts).toFixed(1);
  const pos=stakeholders.filter(s=>s.sentiment==='Positive').length;
