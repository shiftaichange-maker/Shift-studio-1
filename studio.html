<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shift — AI Change Accelerator · Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --n:#07101F;--n2:#0C1A30;--n3:#122040;--n4:#1A2E50;
  --a:#F5921E;--a2:#FFB347;--ab:rgba(245,146,30,0.12);
  --cr:#EDE8DF;--cr2:rgba(237,232,223,0.65);--cr3:rgba(237,232,223,0.28);
  --bd:rgba(237,232,223,0.1);--bd2:rgba(237,232,223,0.2);
  --gr:#3FCF8E;--rd:#FF6B6B;--yl:#FFD166;--pu:#B47FFF;
}
body{font-family:'Inter',sans-serif;background:var(--n);color:var(--cr);font-size:14px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(237,232,223,0.04)}
::-webkit-scrollbar-thumb{background:rgba(237,232,223,0.15);border-radius:3px}
select option{background:var(--n2)}

/* NAV */
.nav{position:sticky;top:0;z-index:50;background:rgba(12,26,48,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px}
.nav-logo{font-family:'Fraunces',serif;font-size:18px;font-weight:500;letter-spacing:-0.02em;flex-shrink:0}
.nav-logo span{color:var(--a)}
.nav-prog{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;color:var(--cr3)}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:5px 12px;border-radius:3px;border:none;background:transparent;color:var(--cr2);font-size:12px;font-weight:400;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;white-space:nowrap}
.nav-tab:hover{color:var(--cr);background:rgba(237,232,223,0.05)}
.nav-tab.active{background:var(--a);color:var(--n);font-weight:600}
.nav-tab.ai-tab.active{background:var(--pu)}
.nav-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.save-ind{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.06em;color:var(--cr3);transition:color 0.3s}
.save-ind.saving{color:var(--a)}
.tier-badge{font-size:10px;color:var(--a);background:var(--ab);padding:2px 8px;border-radius:2px;font-family:'JetBrains Mono',monospace;letter-spacing:0.06em}
.sign-out{background:transparent;border:1px solid var(--bd);color:var(--cr2);padding:4px 11px;border-radius:3px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}
.sign-out:hover{border-color:var(--bd2);color:var(--cr)}

/* MAIN */
.main{padding:24px;max-width:1400px;margin:0 auto}

/* CARDS */
.stat-grid{display:grid;gap:12px;margin-bottom:20px}
.stat-card{background:var(--n2);border:1px solid var(--bd);border-radius:6px;padding:14px 16px;transition:border-color 0.2s}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--cr3);margin-bottom:8px}
.stat-val{font-family:'Fraunces',serif;font-size:26px;font-weight:500;line-height:1}

/* SECTION HEADER */
.sec-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px}
.sec-title{font-family:'Fraunces',serif;font-size:20px;font-weight:500;letter-spacing:-0.01em}
.sec-sub{font-size:12px;color:var(--cr2);margin-top:3px}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* BUTTONS */
.btn{border-radius:3px;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s;white-space:nowrap;border:none}
.btn-primary{background:var(--a);color:var(--n);padding:7px 16px;font-size:12px;font-weight:600}
.btn-primary:hover{background:var(--a2)}
.btn-ghost{background:transparent;color:var(--cr2);border:1px solid var(--bd2);padding:6px 13px;font-size:11px}
.btn-ghost:hover{border-color:var(--cr3);color:var(--cr)}
.btn-ai{background:rgba(180,127,255,0.15);color:var(--pu);border:1px solid rgba(180,127,255,0.3);padding:6px 13px;font-size:11px;font-weight:600}
.btn-ai:hover{background:rgba(180,127,255,0.25)}
.btn-danger{background:rgba(255,107,107,0.1);color:var(--rd);border:1px solid rgba(255,107,107,0.2);padding:6px 13px;font-size:11px}
.btn-danger:hover{background:rgba(255,107,107,0.18)}
.btn-sm{padding:4px 10px;font-size:11px}

/* TABLE */
.tbl-wrap{background:var(--n2);border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--n3);padding:9px 12px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--cr3);font-weight:400;white-space:nowrap;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:2}
tbody tr{border-bottom:1px solid var(--bd);transition:background 0.1s;cursor:pointer;position:relative}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(237,232,223,0.04)}
tbody tr.editing{background:rgba(245,146,30,0.05);border-left:2px solid var(--a)}
tbody tr.new-row{animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
tbody td{padding:10px 12px;vertical-align:middle;font-size:12px;color:var(--cr)}
.td-mono{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cr3)}
.td-name{font-weight:500}
.td-sub{font-size:11px;color:var(--cr2);margin-top:2px;line-height:1.4}
.td-actions{width:60px;text-align:right;opacity:0;transition:opacity 0.15s}
tbody tr:hover .td-actions{opacity:1}
.del-btn{background:none;border:none;color:var(--rd);cursor:pointer;padding:3px 6px;border-radius:3px;font-size:13px;opacity:0.7;transition:opacity 0.15s}
.del-btn:hover{opacity:1;background:rgba(255,107,107,0.1)}
.edit-btn{background:none;border:none;color:var(--cr3);cursor:pointer;padding:3px 6px;border-radius:3px;font-size:11px;transition:all 0.15s}
.edit-btn:hover{color:var(--cr);background:rgba(237,232,223,0.08)}
.empty-row td{padding:48px;text-align:center;color:var(--cr3);font-family:'Fraunces',serif;font-size:15px;font-style:italic}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;white-space:nowrap}
.pill-green{background:rgba(63,207,142,0.13);color:var(--gr)}
.pill-amber{background:rgba(245,146,30,0.15);color:var(--a)}
.pill-red{background:rgba(255,107,107,0.12);color:var(--rd)}
.pill-yellow{background:rgba(255,209,102,0.13);color:var(--yl)}
.pill-gray{background:rgba(237,232,223,0.08);color:var(--cr2)}
.pill-purple{background:rgba(180,127,255,0.15);color:var(--pu)}

/* FORM PANEL */
.form-panel{background:var(--n3);border:1px solid var(--bd2);border-radius:6px;padding:22px;margin-top:14px;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.form-panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.form-panel-title{font-family:'Fraunces',serif;font-size:16px;font-weight:500}
.close-btn{background:none;border:none;color:var(--cr2);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:3px}
.close-btn:hover{background:rgba(237,232,223,0.08);color:var(--cr)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--cr2);display:flex;align-items:center;gap:6px}
.auto-badge{background:var(--a);color:var(--n);font-size:8px;padding:1px 5px;border-radius:2px;letter-spacing:0.04em}
.ai-badge-sm{background:var(--pu);color:var(--n);font-size:8px;padding:1px 5px;border-radius:2px;letter-spacing:0.04em}
.field input,.field select,.field textarea{background:var(--n);border:1px solid var(--bd2);border-radius:3px;padding:8px 10px;color:var(--cr);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--a)}
.field textarea{resize:vertical;min-height:64px}
.field .auto-inp{background:var(--ab);border-color:rgba(245,146,30,0.2);font-style:italic;color:var(--a2)}
.field-hint{font-size:10px;color:var(--cr3);font-style:italic}
.form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd)}

/* FILTERS */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--cr2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.filter-btn:hover{border-color:var(--cr3);color:var(--cr)}
.filter-btn.active{background:var(--a);border-color:var(--a);color:var(--n)}
.filter-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cr3)}

/* PERSONA FILTERS */
.persona-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pf-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--cr2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.pf-btn.active{background:var(--a);border-color:var(--a);color:var(--n)}

/* READINESS DOTS */
.rdots{display:flex;gap:3px}
.rdot{width:9px;height:9px;border-radius:2px;background:rgba(237,232,223,0.1)}
.rdot.on{background:var(--a)}

/* BAR */
.bar-wrap{background:rgba(237,232,223,0.08);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease}

/* HEATMAP */
.hmap{border-collapse:collapse;width:100%}
.hmap th,.hmap td{border:2px solid var(--n);text-align:center;padding:0}
.hmap thead th{background:var(--n3);color:var(--cr2);padding:9px 8px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;font-weight:400}
.hmap thead th:first-child{text-align:left;padding:9px 14px;width:170px}
.hmap tbody th{background:var(--n3);text-align:left;padding:10px 14px;color:var(--cr);font-weight:500;font-size:12px;font-family:'Inter',sans-serif;white-space:nowrap}
.hmap td{height:42px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.h0{background:rgba(237,232,223,0.04);color:var(--cr3)}
.h1{background:rgba(245,146,30,0.15);color:rgba(245,146,30,0.8)}
.h2{background:rgba(245,146,30,0.33);color:var(--a)}
.h3{background:rgba(245,146,30,0.62);color:var(--cr)}
.h4{background:var(--a);color:var(--n)}

/* AI EXTRACT */
.ai-panel{background:rgba(180,127,255,0.06);border:1px solid rgba(180,127,255,0.25);border-radius:6px;padding:20px;margin-bottom:16px;animation:fadeIn 0.2s ease}
.ai-panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ai-panel-title{font-family:'Fraunces',serif;font-size:16px;font-weight:500;color:var(--cr);display:flex;align-items:center;gap:8px}
.drop-zone{border:2px dashed rgba(180,127,255,0.3);border-radius:6px;padding:28px 20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px}
.drop-zone:hover,.drop-zone.over{border-color:var(--pu);background:rgba(180,127,255,0.06)}
.drop-zone-icon{font-size:28px;margin-bottom:8px}
.drop-zone-text{font-size:13px;color:var(--cr2)}
.drop-zone-hint{font-size:10px;color:var(--cr3);margin-top:4px;font-family:'JetBrains Mono',monospace}
.char-count{font-size:11px;color:var(--cr3);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.char-count.ok{color:var(--gr)}
.char-count.warn{color:var(--yl)}
.extract-btn{background:var(--pu);color:var(--n);border:none;padding:9px 24px;border-radius:3px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:8px}
.extract-btn:hover{background:#c99fff}
.extract-btn:disabled{opacity:0.5;cursor:not-allowed}
.extract-btn .spinner{width:14px;height:14px;border:2px solid rgba(7,16,31,0.3);border-top-color:var(--n);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-bar{height:3px;background:rgba(180,127,255,0.2);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--pu);border-radius:2px;transition:width 0.4s ease}

/* RESULTS TABLE */
.results-section{margin-top:14px}
.results-tabs{display:flex;gap:2px;background:var(--n3);border:1px solid var(--bd);border-radius:6px;padding:3px;width:fit-content;margin-bottom:12px}
.results-tab{padding:5px 14px;border-radius:4px;border:none;background:transparent;color:var(--cr2);font-size:11px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.results-tab.active{background:var(--pu);color:var(--n)}
.result-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--n3);border-radius:4px;margin-bottom:6px;border:1px solid transparent;transition:all 0.15s;cursor:pointer}
.result-row:hover{border-color:var(--bd2)}
.result-row.selected{border-color:var(--pu);background:rgba(180,127,255,0.08)}
.result-check{width:16px;height:16px;border-radius:3px;border:2px solid var(--bd2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.15s;font-size:10px;color:var(--n)}
.result-row.selected .result-check{background:var(--pu);border-color:var(--pu)}
.result-content{flex:1;min-width:0}
.result-title{font-size:12px;font-weight:500;color:var(--cr)}
.result-meta{font-size:11px;color:var(--cr2);margin-top:3px;line-height:1.5}
.result-pills{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.add-selected-btn{background:var(--pu);color:var(--n);border:none;padding:9px 22px;border-radius:3px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:12px}
.add-selected-btn:hover{background:#c99fff}
.summary-box{background:var(--n3);border-left:3px solid var(--pu);border-radius:0 4px 4px 0;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--cr2);line-height:1.7}
.summary-box strong{color:var(--cr)}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dash-card{background:var(--n2);border:1px solid var(--bd);border-radius:6px;padding:16px 18px}
.bar-row{display:grid;grid-template-columns:120px 1fr 30px;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:var(--cr2)}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:4px;font-size:12px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:toastIn 0.3s ease;max-width:340px;line-height:1.5}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--n2);border:1px solid var(--bd2);border-radius:8px;padding:32px;width:100%;max-width:360px}

/* VIEW TABS */
.view-tabs{display:flex;gap:3px;background:var(--n3);border:1px solid var(--bd);border-radius:6px;padding:3px;width:fit-content;margin-bottom:16px}
.view-tab{padding:5px 16px;border-radius:4px;border:none;background:transparent;color:var(--cr2);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.view-tab.active{background:var(--a);color:var(--n)}

/* INLINE EDIT */
.inline-edit{display:none;padding:12px;background:var(--n3);border-top:1px solid var(--bd)}
.inline-edit.open{display:block;animation:fadeIn 0.15s ease}
.inline-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.inline-grid .full{grid-column:1/-1}
.inline-field{display:flex;flex-direction:column;gap:4px}
.inline-label{font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--cr3)}
.inline-inp{background:var(--n);border:1px solid var(--bd2);border-radius:3px;padding:6px 8px;color:var(--cr);font-family:'Inter',sans-serif;font-size:12px;outline:none;width:100%}
.inline-inp:focus{border-color:var(--a)}
.inline-sel{background:var(--n);border:1px solid var(--bd2);border-radius:3px;padding:6px 8px;color:var(--cr);font-family:'Inter',sans-serif;font-size:12px;outline:none;width:100%;cursor:pointer}
.inline-actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
</style>

<script type="module">

// ── CONFIG ──────────────────────────────────────────────────────────────

// ── STORAGE ──────────────────────────────────────────────────────────────
const K = {cia:'sc-cia',sh:'sc-sh',act:'sc-act',sess:'sc-sess'};

// ── LOOKUPS ──────────────────────────────────────────────────────────────
const PERSONAS = ['Programme Leadership','MC/EO Leadership','Process Owners','Change Advocates','Super Users','End Users'];
const SUGGEST = {

const ST_COLOR = {

  'In progress':'pill-amber','Draft':'pill-yellow',
  'Not started':'pill-red','On hold':'pill-gray','Closed':'pill-gray'

const SN_COLOR = {Positive:'pill-green',Neutral:'pill-yellow',Resistant:'pill-red',Unknown:'pill-gray'};

// ── FILE READING ──────────────────────────────────────────────────────────
async function readFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'docx') {
    const buf = await file.arrayBuffer();
    const r = await mammoth.extractRawText({arrayBuffer: buf});
    return r.value;
  }
  if (ext === 'xlsx' || ext === 'xls') {
    return new Promise(res => {
      const r = new FileReader();
      r.onload = e => {
        const wb = XLSX.read(e.target.result, {type:'binary'});
        let t = '';
        wb.SheetNames.forEach(n => {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[n], {header:1});
          t += rows.map(r => r.join('\t')).join('\n') + '\n\n';
        });
        res(t);
      };
      r.readAsBinaryString(file);
    });
  }
  // txt / csv / other
  return file.text();
}

// ── CLAUDE API (chunked) ──────────────────────────────────────────────────
async function callClaude(text, onProgress) {
  const chunks = [];
  for (let i = 0; i < text.length && chunks.length < CFG.maxChunks; i += CFG.chunkSize) {
    chunks.push(text.slice(i, i + CFG.chunkSize));
  }

  const prompt = (chunk, idx, total) => `You are a change management expert analysing a document${total>1?` (part ${idx+1} of ${total})`:''}.\n\nExtract ALL change management data found. Return ONLY valid JSON, no markdown:\n{\n  "summary": "${idx===0?'2-3 sentence document summary':''}",\n  "cia_entries": [{\n    "processArea": "",\n    "subProcess": "",\n    "description": "what is changing and impact on people",\n    "changeType": "Process change|Role change|Technology|Policy|Other",\n    "affectedRoles": "comma separated",\n    "impactLevel": "Low|Medium|High|Critical",\n    "benefits": "",\n    "fuel": "what motivates adoption",\n    "friction": "barriers and resistance",\n    "status": "Draft"\n  }],\n  "stakeholders": [{\n    "name": "group name",\n    "jobTitle": "",\n    "persona": "Programme Leadership|MC/EO Leadership|Process Owners|Change Advocates|Super Users|End Users",\n    "site": "",\n    "population": 1,\n    "readiness": 3,\n    "sentiment": "Positive|Neutral|Resistant|Unknown",\n    "influence": "High|Medium|Low",\n    "impactLevel": "Critical|High|Medium|Low",\n    "isAdvocate": false,\n    "notes": ""\n  }],\n  "activities": [{\n    "title": "",\n    "description": "",\n    "audience": "Programme Leadership|MC/EO Leadership|Process Owners|Change Advocates|Super Users|End Users",\n    "channel": "",\n    "owner": "",\n    "reviewer": "",\n    "status": "Not started",\n    "publishDate": "",\n    "impactLevel": "Critical|High|Medium|Low",\n    "ciaLink": ""\n  }]\n}\n\nExtract everything — be thorough. Population=1 if unknown. Return [] if nothing found.\n\nDocument:\n${chunk}`;

  const results = {summary:'', cia_entries:[], stakeholders:[], activities:[]};

  for (let i = 0; i < chunks.length; i++) {
    onProgress && onProgress(Math.round((i / chunks.length) * 85));
    const resp = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 4000,
        messages: [{role:'user', content: prompt(chunks[i], i, chunks.length)}]
      })
    });
    if (!resp.ok) throw new Error(`Function error ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(typeof data.error === 'string' ? data.error : (data.error?.message || JSON.stringify(data.error)));
    const raw = data.content?.map(c=>c.text||'').join('') || '';
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    if (i === 0 && parsed.summary) results.summary = parsed.summary;
    results.cia_entries.push(...(parsed.cia_entries||[]));
    results.stakeholders.push(...(parsed.stakeholders||[]));
    results.activities.push(...(parsed.activities||[]));
  }
  onProgress && onProgress(100);
  return results;
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────
function exportXL(data, filename) {
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  XLSX.writeFile(wb, filename);
}

    <div class="filter-bar">
      ${['all','Not started','In progress','Complete','On hold'].map(f=>`<button class="filter-btn${actSF===f?' active':''}" data-sf="${f}">${f==='all'?'All':f}</button>`).join('')}

        <table>

          <tbody>
            ${filtered.length ? filtered.map(a => {
              const isEditing = inlineEdit?.type==='act' && inlineEdit?.id===a.id;
              return `
              <tr class="${isEditing?'editing':''}" data-act-row="${a.id}">

                <td style="min-width:180px"><div class="td-name">${a.title}</div>${a.ciaLink?`<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--a);margin-top:2px">↳ ${a.ciaLink}</div>`:''}</td>

                <td class="td-sub">${a.audience||'—'}</td>
                <td class="td-sub">${a.channel||'—'}</td>

        <thead><tr><th>Persona / Site</th>${hS.map(s=>`<th>${s}</th>`).join('')}</tr></thead>

      <div class="field"><label>Audience</label><select id="af-audience" onchange="window._suggestAct(this.value)">${[{v:'',l:'— Select —'},...Object.keys(SUGGEST).map(k=>({v:k,l:k}))].map(o=>`<option value="${o.v}"${e.audience===o.v?' selected':''}>${o.l}</option>`).join('')}</select></div>
      <div class="field"><label>Linked CIA</label><select id="af-ciaLink">${ciaOpts.map(o=>`<option value="${o.value}"${e.ciaLink===o.value?' selected':''}>${o.label}</option>`).join('')}</select></div>
      <div class="field"><label>Owner <span class="auto-badge">AUTO</span></label><input id="af-owner" class="auto-inp" value="${e.owner||''}" placeholder="Auto-populated"></div>
      <div class="field"><label>Channel <span class="auto-badge">AUTO</span></label><input id="af-channel" class="auto-inp" value="${e.channel||''}" placeholder="Auto-populated"></div>
      <div class="field"><label>Reviewer <span class="auto-badge">AUTO</span></label><input id="af-reviewer" class="auto-inp" value="${e.reviewer||''}" placeholder="Auto-populated"></div>
      <div class="field"><label>Status</label><select id="af-status">${['Not started','In progress','Complete','On hold'].map(o=>`<option${e.status===o?' selected':''}>${o}</option>`).join('')}</select></div>
      <div class="field"><label>Impact Level</label><select id="af-impactLevel">${['Critical','High','Medium','Low'].map(o=>`<option${e.impactLevel===o?' selected':''}>${o}</option>`).join('')}</select></div>
      <div class="field"><label>Publish Date</label><input type="date" id="af-publishDate" value="${e.publishDate||''}"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="act-form-cancel">Cancel</button>
      <button class="btn btn-primary" id="act-form-save">${state.actEdit?'Save changes':'Add to plan'}</button>
    </div>
  </div>`;
}

// ── INLINE AI PANEL (within modules) ─────────────────────────────────────
function inlineAIPanel(module) {
  return `<div class="ai-panel" style="margin-bottom:16px">
    <div class="ai-panel-head">
      <div class="ai-panel-title"><span style="color:var(--pu)">✦</span> AI Extract — drop a file or paste text</div>
      <button class="close-btn" data-ai-close="${module}">✕</button>
    </div>
    <div class="drop-zone" id="inline-drop-${module}">
      <div class="drop-zone-icon">📄</div>
      <div class="drop-zone-text">Drop file or click to browse</div>
      <div class="drop-zone-hint">.txt · .docx · .xlsx · .csv</div>
    </div>
    <textarea id="inline-ai-text-${module}" placeholder="Or paste your document text here…" rows="4" style="width:100%;background:var(--n);border:1px solid var(--bd2);border-radius:3px;padding:8px;color:var(--cr);font-family:'Inter',sans-serif;font-size:12px;resize:vertical;outline:none;margin-bottom:8px"></textarea>
    <div style="display:flex;justify-content:flex-end">
      <button class="extract-btn" style="padding:7px 18px;font-size:12px" id="inline-extract-${module}">✦ Extract & add to ${module==='cia'?'Change Impact':module==='sh'?'Stakeholders':'C&E Plan'}</button>
    </div>
  </div>`;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────
function loginHTML() {
  return `<div class="login-wrap">
    <div style="margin-bottom:28px;text-align:center">
      <div style="font-family:'Fraunces',serif;font-size:32px;font-weight:500;letter-spacing:-0.02em">shift<span style="color:var(--a)">.</span></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--cr3);margin-top:6px">AI Change Accelerator · Studio</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--cr3);margin-top:4px">${CFG.site}</div>
    </div>
    <div class="login-card">
      <div style="font-size:15px;font-weight:500;margin-bottom:6px">Enter your access code</div>
      <div style="font-size:12px;color:var(--cr2);margin-bottom:20px">Provided when you signed up · <a href="mailto:${CFG.email}" style="color:var(--a);text-decoration:none">${CFG.email}</a></div>
      <input type="password" id="pw-input" placeholder="••••••••" style="width:100%;background:var(--n);border:1px solid var(--bd2);border-radius:3px;padding:9px 11px;color:var(--cr);font-family:'Inter',sans-serif;font-size:15px;outline:none;letter-spacing:0.1em;margin-bottom:10px">
      <div id="pw-err" style="display:none;font-size:12px;color:var(--rd);background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);border-radius:3px;padding:8px 12px;margin-bottom:10px"></div>
      <button id="pw-btn" style="width:100%;background:var(--a);color:var(--n);border:none;padding:11px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Access workspace →</button>
    </div>

}

// ── EVENT BINDING ─────────────────────────────────────────────────────────
function bindLogin() {
  const btn = document.getElementById('pw-btn');
  const inp = document.getElementById('pw-input');
  const err = document.getElementById('pw-err');
  const attempt = () => {
    if (inp.value.trim() === CFG.password) {
      save(K.sess, true);
      setState({authed: true});
    } else {
      err.textContent = `Incorrect password. Contact ${CFG.email} for access.`;
      err.style.display = 'block';
      inp.value = '';
    }
  };
  btn?.addEventListener('click', attempt);
  inp?.addEventListener('keydown', e => e.key==='Enter' && attempt());
}

function bindEvents() {
  // Nav tabs
  document.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => setState({tab:b.dataset.tab})));

  // Sign out
  document.getElementById('sign-out-btn')?.addEventListener('click', () => { save(K.sess,false); setState({authed:false}); });

  // ─ CIA ─
  document.getElementById('cia-add')?.addEventListener('click', () => setState({ciaForm:true, ciaEdit:null}));
  document.getElementById('cia-form-close')?.addEventListener('click', () => setState({ciaForm:false,ciaEdit:null}));
  document.getElementById('cia-form-cancel')?.addEventListener('click', () => setState({ciaForm:false,ciaEdit:null}));
  document.getElementById('cia-ai-toggle')?.addEventListener('click', () => setState({ciaShowAI:!state.ciaShowAI}));
  document.getElementById('cia-export')?.addEventListener('click', () => exportXL(state.cias.map(c=>({'ID':c.id,'Process Area':c.processArea,'Sub-process':c.subProcess,'Description':c.description,'Change Type':c.changeType,'Affected Roles':c.affectedRoles,'Impact Level':c.impactLevel,'Benefits':c.benefits,'Fuel':c.fuel,'Friction':c.friction,'Status':c.status})), `CIA-${Date.now()}.xlsx`));
  document.getElementById('cia-form-save')?.addEventListener('click', () => {
    const pa = document.getElementById('cf-processArea')?.value;
    const desc = document.getElementById('cf-description')?.value;
    if (!pa || !desc) { showToast('Process area and description required', 'var(--rd)'); return; }
    const d = {processArea:pa,subProcess:document.getElementById('cf-subProcess')?.value,description:desc,changeType:document.getElementById('cf-changeType')?.value,affectedRoles:document.getElementById('cf-affectedRoles')?.value,impactLevel:document.getElementById('cf-impactLevel')?.value,benefits:document.getElementById('cf-benefits')?.value,fuel:document.getElementById('cf-fuel')?.value,friction:document.getElementById('cf-friction')?.value,status:document.getElementById('cf-status')?.value};
    if (state.ciaEdit) {
      updateCias(state.cias.map(c=>c.id===state.ciaEdit.id?{...d,id:c.id}:c));
    } else {
      const newRow = {...d, id:nid(state.cias,'CIA')};
      updateCias([...state.cias, newRow]);
    }
    setState({ciaForm:false,ciaEdit:null});
    showToast('✦ CIA entry saved');
  });
  document.querySelectorAll('[data-cia-del]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); if(confirm('Delete this entry?')) { updateCias(state.cias.filter(c=>c.id!==b.dataset.ciaDel)); showToast('Deleted','var(--rd)'); } }));
  document.querySelectorAll('[data-cia-edit]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); const id=b.dataset.ciaEdit; setState({inlineEdit:state.inlineEdit?.id===id?null:{type:'cia',id}}); }));

  // ─ SH ─
  document.getElementById('sh-add')?.addEventListener('click', () => setState({shForm:true,shEdit:null}));
  document.getElementById('sh-form-close')?.addEventListener('click', () => setState({shForm:false,shEdit:null}));
  document.getElementById('sh-form-cancel')?.addEventListener('click', () => setState({shForm:false,shEdit:null}));
  document.getElementById('sh-ai-toggle')?.addEventListener('click', () => setState({shShowAI:!state.shShowAI}));
  document.getElementById('sh-export')?.addEventListener('click', () => exportXL(state.shs.map(s=>({'ID':s.id,'Name':s.name,'Job Title':s.jobTitle,'Persona':s.persona,'Site':s.site,'Population':s.population,'Readiness':s.readiness,'Sentiment':s.sentiment,'Influence':s.influence,'Impact Level':s.impactLevel,'Advocate':s.isAdvocate?'Yes':'No','Notes':s.notes})),`Stakeholders-${Date.now()}.xlsx`));
  document.querySelectorAll('[data-pf]').forEach(b => b.addEventListener('click', () => setState({shPF:b.dataset.pf})));
  document.querySelectorAll('[data-sh-del]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); if(confirm('Delete?')) { updateShs(state.shs.filter(s=>s.id!==b.dataset.shDel)); showToast('Deleted','var(--rd)'); } }));
  document.querySelectorAll('[data-sh-edit]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); const id=b.dataset.shEdit; setState({inlineEdit:state.inlineEdit?.id===id?null:{type:'sh',id}}); }));
  document.getElementById('sh-form-save')?.addEventListener('click', () => {
    const name = document.getElementById('sf-name')?.value;
    if (!name) { showToast('Name required','var(--rd)'); return; }
    const d = {name,jobTitle:document.getElementById('sf-jobTitle')?.value,persona:document.getElementById('sf-persona')?.value,site:document.getElementById('sf-site')?.value,population:parseInt(document.getElementById('sf-population')?.value)||1,readiness:parseInt(document.getElementById('sf-readiness')?.value)||3,sentiment:document.getElementById('sf-sentiment')?.value,influence:document.getElementById('sf-influence')?.value,impactLevel:document.getElementById('sf-impactLevel')?.value,isAdvocate:document.getElementById('sf-isAdvocate')?.value==='true',notes:document.getElementById('sf-notes')?.value};
    if (state.shEdit) { updateShs(state.shs.map(s=>s.id===state.shEdit.id?{...d,id:s.id}:s)); }
    else { updateShs([...state.shs,{...d,id:nid(state.shs,'SH')}]); }
    setState({shForm:false,shEdit:null});
    showToast('✦ Stakeholder saved');
  });

  // ─ ACTS ─
  document.getElementById('act-add')?.addEventListener('click', () => setState({actForm:true,actEdit:null}));
  document.getElementById('act-form-close')?.addEventListener('click', () => setState({actForm:false,actEdit:null}));
  document.getElementById('act-form-cancel')?.addEventListener('click', () => setState({actForm:false,actEdit:null}));
  document.getElementById('act-ai-toggle')?.addEventListener('click', () => setState({actShowAI:!state.actShowAI}));
  document.getElementById('act-export')?.addEventListener('click', () => exportXL(state.acts.map(a=>({'ID':a.id,'Title':a.title,'Description':a.description,'CIA Link':a.ciaLink,'Audience':a.audience,'Channel':a.channel,'Owner':a.owner,'Reviewer':a.reviewer,'Status':a.status,'Date':a.publishDate,'Impact':a.impactLevel})),`CEPlan-${Date.now()}.xlsx`));
  document.querySelectorAll('[data-sf]').forEach(b => b.addEventListener('click', () => setState({actSF:b.dataset.sf})));
  document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => setState({actView:b.dataset.view})));
  document.querySelectorAll('[data-act-del]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); if(confirm('Delete?')) { updateActs(state.acts.filter(a=>a.id!==b.dataset.actDel)); showToast('Deleted','var(--rd)'); } }));
  document.querySelectorAll('[data-act-edit]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); const id=b.dataset.actEdit; setState({inlineEdit:state.inlineEdit?.id===id?null:{type:'act',id}}); }));
  document.getElementById('act-form-save')?.addEventListener('click', () => {
    const title = document.getElementById('af-title')?.value;
    if (!title) { showToast('Title required','var(--rd)'); return; }
    const d = {title,description:document.getElementById('af-description')?.value,ciaLink:document.getElementById('af-ciaLink')?.value,audience:document.getElementById('af-audience')?.value,channel:document.getElementById('af-channel')?.value,owner:document.getElementById('af-owner')?.value,reviewer:document.getElementById('af-reviewer')?.value,status:document.getElementById('af-status')?.value,impactLevel:document.getElementById('af-impactLevel')?.value,publishDate:document.getElementById('af-publishDate')?.value};
    if (state.actEdit) { updateActs(state.acts.map(a=>a.id===state.actEdit.id?{...d,id:a.id}:a)); }
    else { updateActs([...state.acts,{...d,id:nid(state.acts,'A')}]); }
    setState({actForm:false,actEdit:null});
    showToast('✦ Activity saved');
  });

  // Auto-suggest for activity form
  window._suggestAct = (v) => {
    const sg = SUGGEST[v] || {};
    const o = document.getElementById('af-owner');
    const c = document.getElementById('af-channel');
    const rv = document.getElementById('af-reviewer');
    if (o && !o.dataset.manual) o.value = sg.owner || '';
    if (c && !c.dataset.manual) c.value = sg.channel || '';
    if (rv && !rv.dataset.manual) rv.value = sg.reviewer || '';
  };

  // ─ INLINE EDIT SAVE ─
  document.querySelectorAll('[data-ie-save]').forEach(b => b.addEventListener('click', () => {
    const type = b.dataset.ieSave;
    const id = state.inlineEdit?.id;
    if (!id) return;
    const fields = {};
    b.closest('td').querySelectorAll('[data-ie]').forEach(inp => {
      fields[inp.dataset.ie] = inp.type==='checkbox'?inp.checked:inp.value;
    });
    if (type==='cia') { updateCias(state.cias.map(c=>c.id===id?{...c,...fields,population:fields.population?parseInt(fields.population):c.population}:c)); }
    if (type==='sh') { updateShs(state.shs.map(s=>s.id===id?{...s,...fields,population:parseInt(fields.population)||s.population,readiness:parseInt(fields.readiness)||s.readiness,isAdvocate:fields.isAdvocate==='true'}:s)); }
    if (type==='act') { updateActs(state.acts.map(a=>a.id===id?{...a,...fields}:a)); }
    setState({inlineEdit:null});
    showToast('✦ Saved');
  }));
  document.querySelectorAll('[data-ie-cancel]').forEach(b => b.addEventListener('click', () => setState({inlineEdit:null})));

  // ─ AI CLOSE ─
  document.querySelectorAll('[data-ai-close]').forEach(b => b.addEventListener('click', () => {
    const m = b.dataset.aiClose;
    if (m==='cia') setState({ciaShowAI:false});
    if (m==='sh') setState({shShowAI:false});
    if (m==='act') setState({actShowAI:false});
  }));

  // ─ AI INLINE EXTRACT ─
  ['cia','sh','act'].forEach(module => {
    const dropEl = document.getElementById(`inline-drop-${module}`);
    const extractBtn = document.getElementById(`inline-extract-${module}`);
    if (dropEl) {
      dropEl.addEventListener('click', () => { const fi=document.createElement('input');fi.type='file';fi.accept='.txt,.docx,.xlsx,.xls,.csv';fi.onchange=async e=>{if(e.target.files[0]){const t=await readFile(e.target.files[0]);const ta=document.getElementById(`inline-ai-text-${module}`);if(ta)ta.value=t;}};fi.click(); });
      dropEl.addEventListener('dragover', e => {e.preventDefault();dropEl.classList.add('over');});
      dropEl.addEventListener('dragleave', () => dropEl.classList.remove('over'));
      dropEl.addEventListener('drop', async e => { e.preventDefault();dropEl.classList.remove('over');const f=e.dataTransfer.files[0];if(f){const t=await readFile(f);const ta=document.getElementById(`inline-ai-text-${module}`);if(ta)ta.value=t;} });
    }
    if (extractBtn) {
      extractBtn.addEventListener('click', async () => {
        const ta = document.getElementById(`inline-ai-text-${module}`);
        const text = ta?.value?.trim();
        if (!text) { showToast('Please paste text or upload a file first','var(--rd)'); return; }
        extractBtn.disabled = true;
        extractBtn.innerHTML = '<div style="width:12px;height:12px;border:2px solid rgba(7,16,31,0.3);border-top-color:var(--n);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block"></div> Extracting…';
        try {
          const result = await callClaude(text, null);
          applyAIResults(result, module);
          if (module==='cia') setState({ciaShowAI:false});
          if (module==='sh') setState({shShowAI:false});
          if (module==='act') setState({actShowAI:false});
        } catch(e) {
          showToast('⚠ ' + e.message, 'var(--rd)');
          extractBtn.disabled = false;
          extractBtn.textContent = '✦ Extract with AI';
        }
      });
    }
  });

  // ─ MAIN AI TAB ─
  const aiTextEl = document.getElementById('ai-text');
  aiTextEl?.addEventListener('input', () => { state.aiText = aiTextEl.value; });

  const aiDrop = document.getElementById('ai-drop');
  if (aiDrop) {
    aiDrop.addEventListener('click', () => { const fi=document.createElement('input');fi.type='file';fi.accept='.txt,.docx,.xlsx,.xls,.csv';fi.onchange=async e=>{if(e.target.files[0]){const t=await readFile(e.target.files[0]);setState({aiText:t});}};fi.click(); });
    aiDrop.addEventListener('dragover', e => { e.preventDefault(); setState({aiDrag:true}); });
    aiDrop.addEventListener('dragleave', () => setState({aiDrag:false}));
    aiDrop.addEventListener('drop', async e => { e.preventDefault(); setState({aiDrag:false}); const f=e.dataTransfer.files[0]; if(f){const t=await readFile(f);setState({aiText:t});} });
  }

  document.getElementById('ai-extract-btn')?.addEventListener('click', async () => {
    const text = state.aiText.trim();
    if (!text) return;
    setState({aiLoading:true, aiProgress:5, aiResult:null});
    try {
      const result = await callClaude(text, p => setState({aiProgress:p}));
      // auto-select all
      const sel = {
        cia: result.cia_entries?.map((_,i)=>i) || [],
        sh: result.stakeholders?.map((_,i)=>i) || [],
        act: result.activities?.map((_,i)=>i) || [],
      };
      setState({aiLoading:false, aiProgress:100, aiResult:result, aiSelected:sel});
    } catch(e) {
      setState({aiLoading:false, aiProgress:0});
      showToast('⚠ ' + e.message, 'var(--rd)');
    }
  });

  // AI result tabs
  document.querySelectorAll('[data-ai-tab]').forEach(b => b.addEventListener('click', () => setState({aiTab:b.dataset.aiTab})));

  // AI row selection
  document.querySelectorAll('[data-ai-sel]').forEach(row => {
    row.addEventListener('click', () => {
      const type = row.dataset.aiSel;
      const idx = parseInt(row.dataset.aiIdx);
      const sel = {...state.aiSelected};
      if (sel[type].includes(idx)) sel[type] = sel[type].filter(i=>i!==idx);
      else sel[type] = [...sel[type], idx];
      setState({aiSelected:sel});
    });
  });

  // Select all
  document.getElementById('ai-select-all')?.addEventListener('click', () => {
    const r = state.aiResult;
    if (!r) return;
    setState({aiSelected:{
      cia: r.cia_entries?.map((_,i)=>i)||[],
      sh: r.stakeholders?.map((_,i)=>i)||[],
      act: r.activities?.map((_,i)=>i)||[],
    }});
  });

  // Clear results
  document.getElementById('ai-clear')?.addEventListener('click', () => setState({aiResult:null,aiText:'',aiSelected:{cia:[],sh:[],act:[]}}));

  // Add selected
  document.getElementById('ai-add-selected')?.addEventListener('click', () => {
    const r = state.aiResult;
    const sel = state.aiSelected;
    let added = [];
    if (sel.cia.length) {
      const rows = sel.cia.map((i,j) => ({...r.cia_entries[i], id:nid([...state.cias,...r.cia_entries.slice(0,j)],'CIA')}));
      updateCias([...state.cias,...rows]);
      added.push(`${rows.length} CIA entries`);
    }
    if (sel.sh.length) {
      const rows = sel.sh.map((i,j) => ({...r.stakeholders[i], id:nid([...state.shs,...r.stakeholders.slice(0,j)],'SH')}));
      updateShs([...state.shs,...rows]);
      added.push(`${rows.length} stakeholders`);
    }
    if (sel.act.length) {
      const rows = sel.act.map((i,j) => ({...r.activities[i], id:nid([...state.acts,...r.activities.slice(0,j)],'A')}));
      updateActs([...state.acts,...rows]);
      added.push(`${rows.length} activities`);
    }
    showToast(`✦ Added ${added.join(', ')} to your programme`);
    setState({aiResult:null, aiText:'', aiSelected:{cia:[],sh:[],act:[]}});
  });
}

function applyAIResults(result, focus) {
  let added = [];
  if ((focus==='cia'||focus==='all') && result.cia_entries?.length) {
    const rows = result.cia_entries.map((r,i)=>({...r,id:nid([...state.cias,...result.cia_entries.slice(0,i)],'CIA')}));
    updateCias([...state.cias,...rows]);
    added.push(`${rows.length} CIA entries`);
  }
  if ((focus==='sh'||focus==='all') && result.stakeholders?.length) {
    const rows = result.stakeholders.map((r,i)=>({...r,id:nid([...state.shs,...result.stakeholders.slice(0,i)],'SH')}));
    updateShs([...state.shs,...rows]);
    added.push(`${rows.length} stakeholders`);
  }
  if ((focus==='act'||focus==='all') && result.activities?.length) {
    const rows = result.activities.map((r,i)=>({...r,id:nid([...state.acts,...result.activities.slice(0,i)],'A')}));
    updateActs([...state.acts,...rows]);
    added.push(`${rows.length} activities`);
  }
  if (added.length) showToast(`✦ Added ${added.join(', ')} to your programme`);
  else showToast('No data found in document — try with more content', 'var(--yl)');
}

// ── INIT ──────────────────────────────────────────────────────────────────
state.authed = load(K.sess, false);
render();
</script>
